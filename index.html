              border: isMeal ? "1px solid #f0f0f0" : "1px solid #e0e7f0"
            }
          },
            e("div", {
              style: {
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: s.desc ? "8px" : "0",
                flexWrap: "wrap",
                gap: "8px"
              }
            },
              e("div", { style: { display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" } },
                e("span", {
                  style: {
                    fontSize: "13px",
                    fontWeight: 700,
                    color: "#1a3a6c",
                    fontFamily: "monospace"
                  }
                }, s.time),
                e("span", { style: { fontSize: "11px", color: "#999" } }, s.min)
              ),
              s.tag && e("span", {
                style: {
                  fontSize: "11px",
                  padding: "3px 10px",
                  borderRadius: "10px",
                  background: tagColors[s.tag]?.bg || "#eee",
                  color: tagColors[s.tag]?.fg || "#666",
                  fontWeight: 600
                }
              }, s.tag)
            ),
            e("div", {
              style: {
                fontSize: "14px",
                fontWeight: 600,
                color: "#1a1a1a",
                marginBottom: s.desc ? "6px" : "0"
              }
            }, s.title),
            s.desc && e("div", {
              style: {
                fontSize: "12px",
                color: "#666",
                lineHeight: 1.6
              }
            }, s.desc)
          );
        })
      )
    )
  );
}
